<!DOCTYPE html>
<html>
<head>
  <title>Laptop Receiver</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f7f7f7;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .id-box {
      padding: 16px;
      background: #fafafa;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 18px;
    }

    .status {
      margin-top: 10px;
      color: green;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Receiver</h2>

    <div class="id-box" id="peerId">Generating ID...</div>

    <input id="barcodeInput" placeholder="Waiting for scan..." />

    <div class="status" id="status"></div>
  </div>
</div>

<script>
  const peer = new Peer();

  peer.on('open', function(id) {
    document.getElementById('peerId').innerText = id;
  });

  peer.on('connection', function(conn) {
    document.getElementById("status").innerText = "✅ Connected";

    conn.on('data', function(data) {
      const input = document.getElementById("barcodeInput");

      input.value = data;

      input.style.borderColor = "#00a86b";
      setTimeout(() => input.style.borderColor = "#ddd", 300);
    });
  });
</script>

</body>
</html>
